# nixpacks.toml — Railway deployment configuration
#
# Uses aptPkgs (Debian apt) for ffmpeg — more reliable on Railway
# than nixPkgs for binary system tools.

[phases.setup]
aptPkgs = ["ffmpeg", "python3", "python3-pip"]

[phases.install]
cmds = ["pip install -r requirements.txt"]

[start]
cmd = "python bot.py"
